<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>İPEK TAÇ | Çok Yakında</title>
  <meta name="description" content="İPEK TAÇ çok yakında ipektac.com’da. Yeni sayfamız için hazırlıklarımız devam ediyor." />
  <meta name="keywords" content="İPEK TAÇ, ipektac, ipektac.com, eşarp, ipek eşarp, çok yakında, instagram, ipektaccom" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#07162f" />
  <link rel="canonical" href="https://ipektac.com/" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="İPEK TAÇ | Çok Yakında" />
  <meta property="og:description" content="İPEK TAÇ çok yakında ipektac.com’da." />
  <meta property="og:url" content="https://ipektac.com/" />
  <meta property="og:image" content="ipektac-hero.png" />
  <meta property="og:locale" content="tr_TR" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="İPEK TAÇ | Çok Yakında" />
  <meta name="twitter:description" content="İPEK TAÇ çok yakında ipektac.com’da." />
  <meta name="twitter:image" content="ipektac-hero.png" />

  <style>
    :root {
      --page-bg: #07162f;
      --page-bg-deep: #041022;
      --gold: #d1ab67;
      --gold-soft: rgba(209, 171, 103, 0.18);
      --white-soft: rgba(255,255,255,0.06);
      --panel-bg: #07162f;
      --radius: 28px;
      --pad: 24px;
      --shadow: 0 24px 80px rgba(0,0,0,.42);
      --img-ratio: 1536 / 1024;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      background: var(--page-bg);
      font-family: Georgia, "Times New Roman", serif;
    }

    body {
      background:
        radial-gradient(circle at 50% 18%, rgba(255, 226, 179, 0.10), transparent 22%),
        radial-gradient(circle at 20% 78%, rgba(209, 171, 103, 0.12), transparent 28%),
        radial-gradient(circle at 80% 82%, rgba(209, 171, 103, 0.10), transparent 26%),
        linear-gradient(180deg, #0b1d3d 0%, #07162f 58%, #041022 100%);
      cursor: url('./cursor-scarf.svg') 10 6, auto;
    }

    .hero-wrap {
      position: relative;
      width: 100%;
      min-height: 100svh;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: var(--pad);
      overflow: hidden;
      isolation: isolate;
    }

    .hero-wrap::before {
      content: "";
      position: absolute;
      inset: -4%;
      background: url('./ipektac-hero.png') center center / cover no-repeat;
      filter: blur(42px) brightness(.44) saturate(.95);
      transform: scale(1.10);
      z-index: -2;
    }

    .hero-wrap::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.05), transparent 26%),
        linear-gradient(180deg, rgba(7,22,47,.20) 0%, rgba(7,22,47,.42) 100%);
      z-index: -1;
      pointer-events: none;
    }

    .hero-card {
      position: relative;
      width: min(calc(100vw - (var(--pad) * 2)), calc((100vh - (var(--pad) * 2)) * (1536 / 1024)));
      aspect-ratio: var(--img-ratio);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      background: var(--panel-bg);
      isolation: isolate;
      line-height: 0;
      backdrop-filter: blur(3px);
      border: 1px solid rgba(255,255,255,.05);
    }

    .hero-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      background: #07162f;
      transition: transform .9s ease, filter .9s ease;
      will-change: transform, filter;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 22% 18%, rgba(255,255,255,.08), transparent 18%),
        radial-gradient(circle at 78% 30%, rgba(255,229,179,.08), transparent 18%);
      pointer-events: none;
      z-index: 1;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(110deg, transparent 28%, rgba(255,255,255,.14) 48%, transparent 64%);
      opacity: 0;
      transform: translateX(-10%);
      transition: opacity .9s ease, transform .9s ease;
      pointer-events: none;
      mix-blend-mode: screen;
      z-index: 2;
    }

    .hero-card:hover img {
      transform: scale(1.025);
      filter: brightness(1.05) saturate(1.04);
    }

    .hero-card:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    .cursor-glow {
      position: fixed;
      left: 0;
      top: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid rgba(209,171,103,.55);
      background: radial-gradient(circle, rgba(209,171,103,.20) 0%, rgba(209,171,103,0) 68%);
      box-shadow: 0 0 22px rgba(209,171,103,.18);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 9999;
      opacity: 0;
      transition: transform .08s linear, width .22s ease, height .22s ease, opacity .25s ease, border-color .22s ease;
      mix-blend-mode: screen;
    }

    .cursor-glow.is-visible {
      opacity: 1;
    }

    .cursor-glow.is-hover {
      width: 42px;
      height: 42px;
      border-color: rgba(255,230,176,.72);
      box-shadow: 0 0 28px rgba(209,171,103,.26);
    }

    .cursor-dot {
      position: fixed;
      left: 0;
      top: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255, 230, 176, .92);
      box-shadow: 0 0 12px rgba(209,171,103,.40);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 10000;
      opacity: 0;
      transition: transform .04s linear, opacity .25s ease;
    }

    .cursor-dot.is-visible {
      opacity: 1;
    }

    @media (hover: none), (pointer: coarse) {
      body { cursor: auto; }
      .cursor-glow,
      .cursor-dot {
        display: none !important;
      }
    }

    @media (max-width: 1024px) {
      :root {
        --pad: 16px;
        --radius: 22px;
      }

      .hero-wrap {
        align-items: start;
      }

      .hero-card {
        width: min(calc(100vw - (var(--pad) * 2)), calc((100svh - (var(--pad) * 2)) * (1536 / 1024)));
        width: min(calc(100vw - (var(--pad) * 2)), calc((100vh - (var(--pad) * 2)) * (1536 / 1024)));
      }
    }

    @media (max-width: 767px) {
      :root {
        --pad: 10px;
        --radius: 16px;
      }

      .hero-wrap {
        min-height: auto;
        padding: var(--pad);
      }

      .hero-card {
        width: calc(100vw - (var(--pad) * 2));
        aspect-ratio: var(--img-ratio);
      }

      .hero-card img {
        object-fit: cover;
        object-position: center center;
      }
    }
  </style>
</head>
<body>
  <main class="hero-wrap">
    <section class="hero-card" aria-label="İPEK TAÇ ana sayfa görseli">
      <img src="./ipektac-hero.png" alt="İPEK TAÇ çok yakında ana sayfa banner görseli" />
    </section>
  </main>

  <div class="cursor-glow" aria-hidden="true"></div>
  <div class="cursor-dot" aria-hidden="true"></div>

  <script>
    const glow = document.querySelector('.cursor-glow');
    const dot = document.querySelector('.cursor-dot');
    const hoverTargets = document.querySelectorAll('.hero-card');

    const finePointer = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    if (finePointer) {
      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let glowX = mouseX;
      let glowY = mouseY;

      const showCursor = () => {
        glow.classList.add('is-visible');
        dot.classList.add('is-visible');
      };

      const hideCursor = () => {
        glow.classList.remove('is-visible');
        dot.classList.remove('is-visible');
        glow.classList.remove('is-hover');
      };

      window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX;
        mouseY = e.clientY;
        dot.style.left = mouseX + 'px';
        dot.style.top = mouseY + 'px';
        showCursor();
      });

      window.addEventListener('mouseleave', hideCursor);
      window.addEventListener('blur', hideCursor);

      hoverTargets.forEach((el) => {
        el.addEventListener('mouseenter', () => glow.classList.add('is-hover'));
        el.addEventListener('mouseleave', () => glow.classList.remove('is-hover'));
      });

      const animate = () => {
        glowX += (mouseX - glowX) * 0.18;
        glowY += (mouseY - glowY) * 0.18;
        glow.style.left = glowX + 'px';
        glow.style.top = glowY + 'px';
        requestAnimationFrame(animate);
      };

      animate();
    }
  </script>
</body>
</html>
